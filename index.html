<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival - Powerups + Mobile + High Score</title>
<style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial;}
canvas{display:block;margin:auto;background:#111;}
button{position:absolute;font:16px Arial;cursor:pointer;}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let state = "menu";

// ===== GAME DATA =====
let player, saws=[], coins=[], particles=[], bullets=[], spikes=[], bombs=[], megaCoins=[];
let powerUps=[], activeEffects={};

// ===== TRAIL =====
let trail = [];
const MAX_TRAIL = 300; // Max trail segments

let goingUp=false, score=0, frame=0, difficulty=1;
let boss = null;

// ===== SAVE =====
let totalCoins = +localStorage.getItem("coins")||0;
let ownedAbilities = JSON.parse(localStorage.getItem("ownedAbilities"))||{speed:true,magnet:false,shield:false,slow:false,gun:false};
let ability = "speed";

let skins = JSON.parse(localStorage.getItem("skins"))||{default:true,red:false,green:false};
let skinPrices = {red:50, green:100};
let selectedSkin = Object.keys(skins).find(k=>skins[k]);

let highScore = +localStorage.getItem("highScore") || 0;

function save(){
    localStorage.setItem("coins", totalCoins);
    localStorage.setItem("ownedAbilities", JSON.stringify(ownedAbilities));
    localStorage.setItem("skins", JSON.stringify(skins));
    localStorage.setItem("highScore", highScore);
}

// ===== BUTTONS =====
let menuButtons = [];
function clearButtons(){ menuButtons.forEach(b=>b.remove()); menuButtons=[]; }
function createMenuButton(text,x,y,click){
    let b=document.createElement("button");
    b.style.left=x+"px"; b.style.top=y+"px";
    b.textContent=text;
    b.onclick=click;
    document.body.appendChild(b);
    menuButtons.push(b);
}

// ===== AUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function play(freq,dur){
    let o = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.1,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
}

// ===== RESET =====
function resetGame(){
    player = {x:120, y:canvas.height/2, size:10, shield:0, speed:4};

    if(ability==="speed") player.speed = 6;
    if(ability==="slow") player.speed = 3;
    if(ability==="shield") player.shield = 2;

    saws=[]; coins=[]; particles=[]; powerUps=[]; bullets=[]; spikes=[]; bombs=[]; megaCoins=[];
    boss = null;

    score=0; frame=0; difficulty=1;
    gunCooldown = 0;

    trail = []; // Reset trail
}

// ===== INPUT =====
document.addEventListener("keydown", e=>{
    if(e.key==="Escape"){state="menu"; clearButtons(); setupMenu();}
    if(state==="menu"){
        if(e.key==="s"){state="shop"; setupShop();}
        if(e.key==="k"){state="abilities"; setupAbilities();}
        if(e.key==="c"){state="skins"; setupSkins();}
    }
    if(state==="game"){if(e.key==="w"||e.key==="ArrowUp") goingUp=true;}
    if(state==="gameover"){if(e.key==="r"){state="game"; resetGame();}}
});
document.addEventListener("keyup", e=>{
    if(e.key==="w"||e.key==="ArrowUp") goingUp=false;
});

// 📱 MOBILE CONTROLS
canvas.addEventListener("touchstart", e=>{e.preventDefault(); goingUp = true;});
canvas.addEventListener("touchend", e=>{e.preventDefault(); goingUp = false;});
canvas.addEventListener("touchcancel", ()=> goingUp=false);

// ===== SPAWN =====
function spawnSaw(){ saws.push({x:canvas.width+40,y:Math.random()*canvas.height,r:18+difficulty*2,speed:3+difficulty*0.4}); }
function spawnCoin(){ coins.push({x:canvas.width+40,y:Math.random()*(canvas.height-40)+20,r:6}); }
function spawnPowerUp(){
    const types = ["speed","magnet","shield","slow"];
    let type = types[Math.floor(Math.random()*types.length)];
    powerUps.push({x: canvas.width+40, y: Math.random()*(canvas.height-40)+20, r: 8, type});
}

// ===== PARTICLES =====
function burst(x,y){
    for(let i=0;i<10;i++){
        particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20});
    }
}

// ===== POWER EFFECT =====
function activatePowerUp(type){ activeEffects[type] = 300; }

// ===== GUN =====
let gunCooldown = 0; // frames until next shot

// ===== UPDATE =====
function update(){
    if(state!=="game") return;

    frame++; 
    score += 0.5;
    if(score > highScore) highScore = Math.floor(score); // update high score
    difficulty = 1 + score/80;

    let speedMultiplier = 1;
    if(activeEffects.speed) speedMultiplier *= 1.8;
    if(activeEffects.slow) speedMultiplier *= 0.6;

    player.y += goingUp ? -player.speed * speedMultiplier : player.speed * speedMultiplier;

    for(let key in activeEffects){
        activeEffects[key]--;
        if(activeEffects[key] <= 0) delete activeEffects[key];
    }

    player.y=Math.max(player.size, Math.min(canvas.height-player.size,player.y));

    // ===== TRAIL UPDATE =====
    trail.push({x: player.x, y: player.y});
    if(trail.length > MAX_TRAIL) trail.shift();

    let rate = Math.max(25, 90-difficulty*5);
    if(ability==="slow") rate *= 1.3;

    if(frame%Math.floor(rate)===0) spawnSaw();
    if(frame%110===0) spawnCoin();
    if(frame % 1500 === 0) spawnPowerUp(); 

    // ===== SAWS =====
    for(let i=saws.length-1;i>=0;i--){
        let s=saws[i];
        s.x -= s.speed*(ability==="slow"?0.6:1);
        let dx=player.x-s.x, dy=player.y-s.y;
        if(Math.hypot(dx,dy)<s.r+player.size){
            if(player.shield>0 || activeEffects.shield){
                if(player.shield>0) player.shield--;
                burst(player.x,player.y);
                saws.splice(i,1);
                continue;
            }
            play(100,0.2);
            state="gameover";
        }
        if(s.x<-100) saws.splice(i,1);
    }

    // ===== GUN SHOOTING =====
    if(ability==="gun"){
        if(gunCooldown <= 0){
            bullets.push({x: player.x+20, y: player.y, size:6, speed:8});
            gunCooldown = 600; // 10s cooldown
            play(900,0.1);
        } else gunCooldown--;
    }

    // Bullets movement & collision
    for(let i=bullets.length-1;i>=0;i--){
        let b = bullets[i];
        b.x += b.speed;
        for(let j=saws.length-1;j>=0;j--){
            let s = saws[j];
            if(Math.hypot(s.x-b.x,s.y-b.y)<s.r+b.size){
                burst(s.x,s.y);
                saws.splice(j,1);
                bullets.splice(i,1);
                break;
            }
        }
        if(b && b.x>canvas.width+50) bullets.splice(i,1);
    }

    // ... keep rest of original update logic (boss, spikes, coins, powerups, particles) ...

    save();
}

// ===== DRAW =====
function draw(){
    ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);

    if(state==="game"||state==="gameover"){

        // ===== DRAW TRAIL =====
        if(trail.length>1){
            ctx.beginPath();
            ctx.moveTo(trail[0].x, trail[0].y);
            for(let i=1;i<trail.length;i++){
                ctx.lineTo(trail[i].x, trail[i].y);
            }
            ctx.strokeStyle = selectedSkin==="red"?"red":selectedSkin==="green"?"lime":"white";
            ctx.lineWidth = 4;
            ctx.shadowBlur = 12;
            ctx.shadowColor = ctx.strokeStyle;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ===== PLAYER =====
        let color = selectedSkin==="red"?"red":selectedSkin==="green"?"green":"white";
        ctx.fillStyle=color;
        ctx.fillRect(player.x-player.size, player.y-player.size, 20, 20);

        // ===== REST OF DRAW LOGIC =====
        // Saw, coins, powerups, bullets, spikes, boss, megaCoins, UI
        // (keep your original drawing code for them)
    }

    // Menu/gameover/shop/abilities/skins drawing stays the same
}

// ===== MENU & SHOP =====
function setupMenu(){ clearButtons(); createMenuButton("START",400,260,()=>{ state="game"; resetGame(); clearButtons(); }); }
function setupShop(){ /* same as original */ }
function setupAbilities(){ /* same as original */ }
function setupSkins(){ /* same as original */ }

// ===== LOOP =====
function loop(){ update(); draw(); requestAnimationFrame(loop); }
setupMenu();
loop();

</script>
</body>
</html>
