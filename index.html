<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival Full Menus</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
canvas{display:block;margin:auto; background:#111;}
button{position:absolute;font:16px Arial; cursor:pointer;}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let state = "menu"; // menu, game, gameover, shop, abilities, skins, achievements

// ===== DATA =====
let player,saws,coins,particles;
let goingUp=false;
let score=0,frame=0,difficulty=1;
let shake=0;

// ===== SAVE =====
let totalCoins = +localStorage.getItem("coins")||0;
let ownedAbilities = JSON.parse(localStorage.getItem("ownedAbilities")) || {speed:true, magnet:false, shield:false, slow:false};
let ability = "speed";
let skins = JSON.parse(localStorage.getItem("skins")) || {default:true, red:false, green:false};
let selectedSkin = Object.keys(skins).find(k=>skins[k]);
let achievements = JSON.parse(localStorage.getItem("ach")) || {score100:false, coins100:false};

function save(){
  localStorage.setItem("coins",totalCoins);
  localStorage.setItem("ownedAbilities",JSON.stringify(ownedAbilities));
  localStorage.setItem("skins",JSON.stringify(skins));
  localStorage.setItem("ach",JSON.stringify(achievements));
}

// ===== AUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let musicOn=true;
function play(freq,dur){
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=freq;
  g.gain.setValueAtTime(0.1,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
setInterval(()=>{
  if(musicOn && state==="game") play(200+Math.random()*100,0.2);
},400);

// ===== RESET GAME =====
function resetGame(){
  player={x:120,y:canvas.height/2,size:10,speed:4,shield:0};
  if(ability==="speed") player.speed=6;
  if(ability==="shield") player.shield=1;
  saws=[]; coins=[]; particles=[]; score=0; frame=0; difficulty=1;
}

// ===== INPUT =====
document.addEventListener("keydown",e=>{
  if(e.key==="m") musicOn=!musicOn;
  if(state==="menu"){
    if(e.key==="Enter"){state="game"; resetGame();}
    if(e.key==="s") state="shop";
    if(e.key==="a") state="achievements";
    if(e.key==="k") state="abilities";
    if(e.key==="c") state="skins";
  } else if(state==="game"){
    if(e.key==="w"||e.key==="ArrowUp") goingUp=true;
  } else if(state==="gameover"){
    if(e.key==="r"){state="game"; resetGame();}
    if(e.key==="s") state="shop";
  } else if(["shop","abilities","skins"].includes(state)){
    if(e.key==="Escape") state="menu";
  } else if(state==="achievements"){
    if(e.key==="Escape") state="menu";
  }
});
document.addEventListener("keyup",e=>{
  if(e.key==="w"||e.key==="ArrowUp") goingUp=false;
});

// ===== SPAWN =====
function spawnSaw(){
  saws.push({x:canvas.width+40,y:Math.random()*canvas.height,r:18 + difficulty*2,speed:3 + difficulty*0.4});
}
function spawnCoin(){
  coins.push({x:canvas.width+40,y:Math.random()*(canvas.height-40)+20,r:6});
}

// ===== PARTICLES =====
function burst(x,y){
  for(let i=0;i<10;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20});
  }
}

// ===== UPDATE =====
function update(){
  if(state!=="game") return;
  frame++; score+=0.5; difficulty=1+score/80;
  if(goingUp) player.y-=player.speed; else player.y+=player.speed;
  player.y=Math.max(player.size, Math.min(canvas.height-player.size, player.y));
  let rate=Math.max(25,90-difficulty*5); if(ability==="slow") rate*=1.3;
  if(frame%Math.floor(rate)===0) spawnSaw();
  if(frame%110===0) spawnCoin();

  // saws
  for(let i=saws.length-1;i>=0;i--){
    let s=saws[i]; s.x-=s.speed*(ability==="slow"?0.6:1);
    if(Math.hypot(player.x-s.x,player.y-s.y)<s.r+player.size){
      if(player.shield>0){player.shield--; burst(player.x,player.y); shake=10; saws.splice(i,1); continue;}
      play(100,0.2); shake=15; state="gameover";
    }
    if(s.x<-100) saws.splice(i,1);
  }

  // coins
  for(let i=coins.length-1;i>=0;i--){
    let c=coins[i]; let dx=player.x-c.x,dy=player.y-c.y,dist=Math.hypot(dx,dy);
    if(ability==="magnet"&&dist<150){c.x+=dx*0.08;c.y+=dy*0.08;} else c.x-=4;
    if(dist<c.r+player.size){totalCoins++; burst(c.x,c.y); coins.splice(i,1); play(700,0.05);}
    if(c.x<-50) coins.splice(i,1);
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; if(p.life<=0) particles.splice(i,1);
  }

  // achievements
  if(score>100) achievements.score100=true;
  if(totalCoins>100) achievements.coins100=true;
  save();
}

// ===== DRAW =====
function draw(){
  // background gradient
  let g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  g.addColorStop(0,"hsl("+frame%360+",50%,10%)"); g.addColorStop(1,"#000");
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);

  // screen shake
  if(shake>0){shake--; ctx.save(); ctx.translate(Math.random()*6-3,Math.random()*6-3);}
  
  if(state==="game"||state==="gameover"){
    ctx.fillStyle=skins[selectedSkin]?"cyan":"white"; ctx.fillRect(player.x-player.size,player.y-player.size,20,20);
    if(player.shield>0){ctx.strokeStyle="blue";ctx.beginPath();ctx.arc(player.x,player.y,20,0,Math.PI*2);ctx.stroke();}
    ctx.fillStyle="red"; for(let s of saws){ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle="gold"; for(let c of coins){ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle="yellow"; for(let p of particles){ctx.fillRect(p.x,p.y,2,2);}
    ctx.fillStyle="white"; ctx.fillText("Score: "+Math.floor(score),10,20);
    ctx.fillText("Coins: "+totalCoins,10,40);
    ctx.fillText("Ability: "+ability,10,60);
  }

  if(state==="menu"){ctx.fillStyle="white";ctx.font="40px Arial";ctx.fillText("Wave Survival",300,150);
    ctx.font="20px Arial"; ctx.fillText("ENTER Start | S Shop | A Achievements | K Abilities | C Skins",150,220);}
  
  if(state==="shop"){drawShop();}
  if(state==="abilities"){drawAbilities();}
  if(state==="skins"){drawSkins();}
  if(state==="achievements"){drawAchievements();}
  
  if(state==="gameover"){ctx.fillStyle="white"; ctx.fillText("Game Over",350,200);}
  
  if(shake>0) ctx.restore();
}

// ===== UI BUTTONS =====
function createButton(text,x,y,click){
  let btn = document.createElement("button");
  btn.style.left=x+"px"; btn.style.top=y+"px"; btn.textContent=text;
  btn.onclick=click; document.body.appendChild(btn); return btn;
}

let shopButtons=[], abilityButtons=[], skinButtons=[];
function clearButtons(){[...shopButtons,...abilityButtons,...skinButtons].forEach(b=>b.remove());
shopButtons=[]; abilityButtons=[]; skinButtons=[];}

function drawShop(){
  clearButtons();
  shopButtons.push(createButton("Buy Magnet (50)",300,150,()=>buy("magnet",50)));
  shopButtons.push(createButton("Buy Shield (70)",300,180,()=>buy("shield",70)));
  shopButtons.push(createButton("Buy Slow (60)",300,210,()=>buy("slow",60)));
}
function drawAbilities(){
  clearButtons();
  let y=150; for(let ab in ownedAbilities){
    let t = ownedAbilities[ab]?ab+" (owned)":"LOCKED";
    abilityButtons.push(createButton(t,300,y,()=>{if(ownedAbilities[ab]) ability=ab;})); y+=30;
  }
}
function drawSkins(){
  clearButtons();
  let y=150; for(let sk in skins){
    let t = sk + (skins[sk]?" (selected)":"");
    skinButtons.push(createButton(t,300,y,()=>{if(skins[sk]) selectedSkin=sk;})); y+=30;
  }
}
function drawAchievements(){
  clearButtons();
  ctx.fillStyle="white"; ctx.font="20px Arial";
  ctx.fillText("Score100: "+(achievements.score100?"✔":"❌"),300,180);
  ctx.fillText("Coins100: "+(achievements.coins100?"✔":"❌"),300,220);
  ctx.fillText("ESC to Menu",300,300);
}

// ===== LOOP =====
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

</body>
</html>
