<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Game</title>
let score = 0;
<style>
body{
  margin:0;
  background:#111;
  overflow:hidden;
}
canvas{
  display:block;
  margin:auto;
  background:#222;
}
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
  x:100,
  y:200,
  size:10,
  speed:4
};

let goingUp = false;
let saws = [];
let frame = 0;
let gameOver = false;

document.addEventListener("keydown", e=>{
  if(e.key==="w" || e.key==="ArrowUp") goingUp=true;
});

document.addEventListener("keyup", e=>{
  if(e.key==="w" || e.key==="ArrowUp") goingUp=false;
});

function spawnSaw(){
function spawnSaw(){
  let y = Math.random() * canvas.height;

  let sizeIncrease = score * 0.3;

  saws.push({
    x:canvas.width + 40,
    y:y,
    r:20 + sizeIncrease
  });
}

function update(){
  score += 0.05;
  if(gameOver) return;

  frame++;

  if(goingUp) player.y -= player.speed;
  else player.y += player.speed;

  if(player.y < 0) player.y = 0;
  if(player.y > canvas.height) player.y = canvas.height;

  if(frame % 90 === 0){
    spawnSaw();
  }

  for(let i=0;i<saws.length;i++){
    saws[i].x -= 4;

    let dx = player.x - saws[i].x;
    let dy = player.y - saws[i].y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < saws[i].r + player.size){
      gameOver = true;
    }
  }

}

function drawSaw(x,y,r){
  ctx.save();
  ctx.translate(x,y);

  ctx.beginPath();
  for(let i=0;i<20;i++){
    let angle = i * Math.PI / 10;
    let rad = i%2===0 ? r : r/2;
    ctx.lineTo(Math.cos(angle)*rad, Math.sin(angle)*rad);
  }
  ctx.closePath();

  ctx.fillStyle="red";
  ctx.fill();
  ctx.restore();
}

function draw(){
  ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: " + Math.floor(score), 10, 25);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="cyan";
  ctx.fillRect(player.x-player.size, player.y-player.size, player.size*2, player.size*2);

  for(let saw of saws){
    drawSaw(saw.x, saw.y, saw.r);
  }

  if(gameOver){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("Game Over",300,200);
  }

}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
