<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival Abilities</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
canvas{display:block;margin:auto;background:#111;}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let state="menu";

// ===== GAME =====
let player,saws,coins,particles;
let goingUp=false;
let score=0,frame=0;
let ability="speed";

// ===== SAVE =====
let totalCoins=+localStorage.getItem("coins")||0;
let achievements=JSON.parse(localStorage.getItem("ach"))||{
score100:false,
coins100:false
};

// ===== SOUND SYSTEM =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function playSound(type){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();

o.connect(g);
g.connect(audioCtx.destination);

if(type==="coin") o.frequency.value=700;
if(type==="hit") o.frequency.value=100;
if(type==="start") o.frequency.value=300;

g.gain.setValueAtTime(0.1,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);

o.start();
o.stop(audioCtx.currentTime+0.2);
}

// ===== RESET =====
function resetGame(){

player={
x:120,
y:225,
size:10,
speed:4,
shield:0
};

// apply ability
if(ability==="speed") player.speed=6;
if(ability==="shield") player.shield=1;

saws=[]; coins=[]; particles=[];
score=0; frame=0;
}

// ===== INPUT =====
document.addEventListener("keydown",e=>{

if(state==="menu"){
if(e.key==="Enter"){state="game";resetGame(); playSound("start");}
if(e.key==="1") ability="speed";
if(e.key==="2") ability="magnet";
if(e.key==="3") ability="shield";
if(e.key==="4") ability="slow";
}

if(state==="game"){
if(e.key==="w"||e.key==="ArrowUp") goingUp=true;
}

if(state==="gameover"){
if(e.key==="r"){state="game";resetGame();}
}

if(e.key==="Escape") state="menu";

});

document.addEventListener("keyup",e=>{
if(e.key==="w"||e.key==="ArrowUp") goingUp=false;
});

// MOBILE
canvas.addEventListener("touchstart",()=>goingUp=true);
canvas.addEventListener("touchend",()=>goingUp=false);

// ===== PATTERNS =====
function spawnPattern(){

let type = Math.floor(Math.random()*3);

// wave
if(type===0){
for(let i=0;i<5;i++){
saws.push({x:900+i*60,y:200+Math.sin(i)*100,r:20,speed:4});
}
}

// tunnel
if(type===1){
for(let y=0;y<450;y+=80){
saws.push({x:900,y:y,r:25,speed:4});
}
}

// burst
if(type===2){
for(let i=0;i<8;i++){
saws.push({x:900,y:Math.random()*450,r:15,speed:5});
}
}

}

// ===== UPDATE =====
function update(){

if(state!=="game") return;

frame++; score+=0.5;

// movement
if(goingUp) player.y-=player.speed;
else player.y+=player.speed;

player.y=Math.max(10,Math.min(440,player.y));

// spawn patterns
if(frame%120===0) spawnPattern();

// coins
if(frame%100===0){
coins.push({x:900,y:Math.random()*450,r:6});
}

// saws
for(let i=saws.length-1;i>=0;i--){
let s=saws[i];

let slowFactor = (ability==="slow") ? 0.6 : 1;

s.x -= s.speed * slowFactor;

// collision
let dx=player.x-s.x, dy=player.y-s.y;
if(Math.hypot(dx,dy) < s.r + player.size){

if(player.shield>0){
player.shield--;
saws.splice(i,1);
continue;
}

playSound("hit");
state="gameover";
}

if(s.x<-50) saws.splice(i,1);
}

// coins
for(let i=coins.length-1;i>=0;i--){
let c=coins[i];

let dx=player.x-c.x, dy=player.y-c.y;
let d=Math.hypot(dx,dy);

// magnet ability
if(ability==="magnet" && d<120){
c.x += dx*0.05;
c.y += dy*0.05;
}else{
c.x -= 4;
}

if(d < c.r + player.size){
totalCoins++;
particles.push({x:c.x,y:c.y,life:20});
coins.splice(i,1);
playSound("coin");
}

if(c.x<-50) coins.splice(i,1);
}

// particles
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.y -= 1;
p.life--;
if(p.life<=0) particles.splice(i,1);
}

// achievements
if(score>100) achievements.score100=true;
if(totalCoins>100) achievements.coins100=true;

localStorage.setItem("coins",totalCoins);
localStorage.setItem("ach",JSON.stringify(achievements));
}

// ===== DRAW =====
function draw(){

ctx.clearRect(0,0,900,450);

// MENU
if(state==="menu"){
ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("Wave Survival",300,150);

ctx.font="20px Arial";
ctx.fillText("ENTER to Start",350,200);

ctx.fillText("1 Speed  2 Magnet  3 Shield  4 Slow",260,250);
ctx.fillText("Selected: "+ability,350,290);
}

// GAME
if(state==="game"||state==="gameover"){

// player
ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,20,20);

// shield visual
if(player.shield>0){
ctx.strokeStyle="blue";
ctx.beginPath();
ctx.arc(player.x,player.y,20,0,Math.PI*2);
ctx.stroke();
}

// saws
ctx.fillStyle="red";
for(let s of saws){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

// coins
ctx.fillStyle="gold";
for(let c of coins){
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();
}

// particles
ctx.fillStyle="yellow";
for(let p of particles){
ctx.fillRect(p.x,p.y,2,2);
}

// UI
ctx.fillStyle="white";
ctx.fillText("Score:"+Math.floor(score),10,20);
ctx.fillText("Coins:"+totalCoins,10,40);

// game over
if(state==="gameover"){
ctx.font="30px Arial";
ctx.fillText("Game Over",350,200);
ctx.font="18px Arial";
ctx.fillText("R to Retry",370,230);
}
}
}

// LOOP
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
