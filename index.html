<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival - Powerups + Mobile</title>
<style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial;}
canvas{display:block;margin:auto;background:#111;}
button{position:absolute;font:16px Arial;cursor:pointer;}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let state = "menu";

// ===== GAME DATA =====
let player, saws=[], coins=[], particles=[], bullets=[], spikes=[], bombs=[], megaCoins=[];
let powerUps=[], activeEffects={};

let goingUp=false, score=0, frame=0, difficulty=1;
let boss = null;

// ===== SAVE =====
let totalCoins = +localStorage.getItem("coins")||0;
let ownedAbilities = JSON.parse(localStorage.getItem("ownedAbilities"))||{speed:true,magnet:false,shield:false,slow:false,gun:false};
let ability = "speed";

let skins = JSON.parse(localStorage.getItem("skins"))||{default:true,red:false,green:false};
let skinPrices = {red:50, green:100};
let selectedSkin = Object.keys(skins).find(k=>skins[k]);

function save(){
    localStorage.setItem("coins", totalCoins);
    localStorage.setItem("ownedAbilities", JSON.stringify(ownedAbilities));
    localStorage.setItem("skins", JSON.stringify(skins));
}

// ===== BUTTONS =====
let menuButtons = [];
function clearButtons(){ menuButtons.forEach(b=>b.remove()); menuButtons=[]; }
function createMenuButton(text,x,y,click){
    let b=document.createElement("button");
    b.style.left=x+"px"; b.style.top=y+"px";
    b.textContent=text;
    b.onclick=click;
    document.body.appendChild(b);
    menuButtons.push(b);
}

// ===== AUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function play(freq,dur){
    let o = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.1,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
}

// ===== RESET =====
function resetGame(){
    player = {x:120, y:canvas.height/2, size:10, shield:0, speed:4};

    if(ability==="speed") player.speed = 6;
    if(ability==="slow") player.speed = 3;
    if(ability==="shield") player.shield = 2;

    saws=[]; coins=[]; particles=[]; powerUps=[]; bullets=[]; spikes=[]; bombs=[]; megaCoins=[];
    boss = null;

    score=0; frame=0; difficulty=1;

    // gun cooldown
    gunCooldown = 0;
}

// ===== INPUT =====
document.addEventListener("keydown", e=>{
    if(e.key==="Escape"){state="menu"; clearButtons(); setupMenu();}
    if(state==="menu"){
        if(e.key==="s"){state="shop"; setupShop();}
        if(e.key==="k"){state="abilities"; setupAbilities();}
        if(e.key==="c"){state="skins"; setupSkins();}
    }
    if(state==="game"){if(e.key==="w"||e.key==="ArrowUp") goingUp=true;}
    if(state==="gameover"){if(e.key==="r"){state="game"; resetGame();}}
});
document.addEventListener("keyup", e=>{
    if(e.key==="w"||e.key==="ArrowUp") goingUp=false;
});

// 📱 MOBILE CONTROLS
canvas.addEventListener("touchstart", e=>{e.preventDefault(); goingUp = true;});
canvas.addEventListener("touchend", e=>{e.preventDefault(); goingUp = false;});
canvas.addEventListener("touchcancel", ()=> goingUp=false);

// ===== SPAWN =====
function spawnSaw(){ saws.push({x:canvas.width+40,y:Math.random()*canvas.height,r:18+difficulty*2,speed:3+difficulty*0.4}); }
function spawnCoin(){ coins.push({x:canvas.width+40,y:Math.random()*(canvas.height-40)+20,r:6}); }
function spawnPowerUp(){
    const types = ["speed","magnet","shield","slow"];
    let type = types[Math.floor(Math.random()*types.length)];
    powerUps.push({x: canvas.width+40, y: Math.random()*(canvas.height-40)+20, r: 8, type: type});
}

// ===== PARTICLES =====
function burst(x,y){
    for(let i=0;i<10;i++){
        particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20});
    }
}

// ===== POWER EFFECT =====
function activatePowerUp(type){ activeEffects[type] = 300; }

// ===== GUN =====
let gunCooldown = 0; // frames until next shot

// ===== UPDATE =====
function update(){
    if(state!=="game") return;

    frame++; score+=0.5; difficulty=1+score/80;

    let speedMultiplier = 1;
    if(activeEffects.speed) speedMultiplier = 1.8;
    if(activeEffects.slow) speedMultiplier = 0.6;

    player.y += goingUp ? -player.speed * speedMultiplier : player.speed * speedMultiplier;

    for(let key in activeEffects){
        activeEffects[key]--;
        if(activeEffects[key] <= 0) delete activeEffects[key];
    }

    player.y=Math.max(player.size, Math.min(canvas.height-player.size,player.y));

    let rate = Math.max(25, 90-difficulty*5);
    if(ability==="slow") rate *= 1.3;

    if(frame%Math.floor(rate)===0) spawnSaw();
    if(frame%110===0) spawnCoin();
    if(frame % 1500 === 0) spawnPowerUp(); 

    for(let i=saws.length-1;i>=0;i--){
        let s=saws[i];
        s.x -= s.speed*(ability==="slow"?0.6:1);
        let dx=player.x-s.x, dy=player.y-s.y;
        if(Math.hypot(dx,dy)<s.r+player.size){
            if(player.shield>0 || activeEffects.shield){
                if(player.shield>0) player.shield--;
                burst(player.x,player.y);
                saws.splice(i,1);
                continue;
            }
            play(100,0.2);
            state="gameover";
        }
        if(s.x<-100) saws.splice(i,1);
    }

    // ===== GUN SHOOTING =====
    if(ability==="gun"){
        if(gunCooldown <= 0){
            bullets.push({x: player.x+20, y: player.y, size:6, speed:8});
            gunCooldown = 600; // 10s cooldown
            play(900,0.1);
        } else gunCooldown--;
    }

    // Bullets movement & collision
    for(let i=bullets.length-1;i>=0;i--){
        let b = bullets[i];
        b.x += b.speed;
        for(let j=saws.length-1;j>=0;j--){
            let s = saws[j];
            if(Math.hypot(s.x-b.x,s.y-b.y)<s.r+b.size){
                burst(s.x,s.y);
                saws.splice(j,1);
                bullets.splice(i,1);
                break;
            }
        }
        if(b && b.x>canvas.width+50) bullets.splice(i,1);
    }

    // ===== BOSS SPAWN & LOGIC =====
    if(score>=1000 && Math.floor(score) % 1000 === 0 && boss === null){
        boss = {x: canvas.width+100, y: canvas.height/2, size:40, timer:600, vy: 2};
    }

    if(boss){
        boss.x -= 1;
        boss.y += boss.vy;
        if(boss.y < boss.size/2 || boss.y > canvas.height-boss.size/2) boss.vy *= -1;
        
        // shoot spikes every 60 frames
        if(frame % 60 === 0){
            spikes.push({x: boss.x - 20, y: boss.y, vx: -5, vy: 0, size:8});
        }

        boss.timer--;
        if(boss.timer <= 0){
            bombs.push({x: boss.x, y: boss.y, size:30, vx:0, vy:0});
            megaCoins.push({x: boss.x, y: boss.y, r:10, value:25});
            boss = null;
        }
    }

    // ===== SPIKES =====
    for(let i=spikes.length-1;i>=0;i--){
        let s=spikes[i]; s.x += s.vx; s.y += s.vy;
        if(Math.hypot(s.x-player.x,s.y-player.y)<s.size+player.size){
            if(player.shield>0 || activeEffects.shield){
                if(player.shield>0) player.shield--;
                burst(player.x,player.y);
                spikes.splice(i,1);
                continue;
            }
            play(100,0.2);
            state="gameover";
        }
        if(s.x<-50) spikes.splice(i,1);
    }

    // ===== MEGA COINS HOMING =====
    for(let i=megaCoins.length-1;i>=0;i--){
        let c = megaCoins[i];

        // Vector toward player
        let dx = player.x - c.x;
        let dy = player.y - c.y;
        let dist = Math.hypot(dx, dy);
        if(dist < 1) dist = 1; // avoid division by zero

        // Move toward player
        let speed = 4;
        c.x += (dx / dist) * speed;
        c.y += (dy / dist) * speed;

        // Collect
        if(dist < player.size + c.r){
            totalCoins += c.value;
            burst(c.x, c.y);
            megaCoins.splice(i,1);
            play(900,0.05);
        }
    }

    for(let i=coins.length-1;i>=0;i--){
        let c=coins[i]; let dx=player.x-c.x, dy=player.y-c.y, dist=Math.hypot(dx,dy);
        if((ability==="magnet" || activeEffects.magnet) && dist<150){ c.x+=dx*0.08; c.y+=dy*0.08; } else c.x-=4;
        if(dist<c.r+player.size){ totalCoins++; burst(c.x,c.y); coins.splice(i,1); play(700,0.05); }
        if(c.x<-50) coins.splice(i,1);
    }

    for(let i=powerUps.length-1;i>=0;i--){
        let p = powerUps[i]; p.x -= 4;
        let dx = player.x - p.x, dy = player.y - p.y, dist = Math.hypot(dx,dy);
        if(dist < p.r + player.size){ activatePowerUp(p.type); burst(p.x,p.y); play(500,0.1); powerUps.splice(i,1); continue; }
        if(p.x < -50) powerUps.splice(i,1);
    }

    for(let i=particles.length-1;i>=0;i--){ let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; if(p.life<=0) particles.splice(i,1); }

    save();
}

// ===== DRAW =====
function draw(){
    ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);

    if(state==="game"||state==="gameover"){
        let color="white"; if(selectedSkin==="red") color="red"; else if(selectedSkin==="green") color="green";
        ctx.fillStyle=color; ctx.fillRect(player.x-player.size,player.y-player.size,20,20);
        if(player.shield>0){ ctx.strokeStyle="blue"; ctx.beginPath(); ctx.arc(player.x,player.y,20,0,Math.PI*2); ctx.stroke(); }

        ctx.fillStyle="red"; for(let s of saws){ ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }
        ctx.fillStyle="gold"; for(let c of coins){ ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill(); }

        for(let p of powerUps){
            ctx.fillStyle=(p.type==="speed")?"cyan":(p.type==="magnet")?"purple":(p.type==="shield")?"blue":"lightgreen";
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        }

        ctx.fillStyle="yellow"; for(let p of particles) ctx.fillRect(p.x,p.y,2,2);

        // Bullets
        ctx.fillStyle="darkred"; for(let b of bullets) ctx.fillRect(b.x-b.size/2,b.y-b.size/2,b.size,b.size);

        // Spikes
        ctx.fillStyle="#00FF00"; for(let s of spikes) ctx.fillRect(s.x-s.size/2,s.y-s.size/2,s.size,s.size);

        // Boss
        if(boss){ ctx.fillStyle="purple"; ctx.fillRect(boss.x-boss.size/2,boss.y-boss.size/2,boss.size,boss.size); }

        // Mega coins
        ctx.fillStyle="gold"; for(let c of megaCoins){ ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill(); }

        // UI
        ctx.fillStyle="white";
        ctx.fillText("Score:"+Math.floor(score),10,20);
        ctx.fillText("Coins:"+totalCoins,10,40);
        ctx.fillText("Ability:"+ability,10,60);
        ctx.fillText("PowerUps:"+Object.keys(activeEffects).join(","),10,80);
        if(ability==="gun") ctx.fillText("Gun CD: "+Math.max(0,Math.floor(gunCooldown/60))+"s",10,100);
    }

    if(state==="menu"){ ctx.fillStyle="white"; ctx.font="30px Arial"; ctx.fillText("Wave Survival",300,150); ctx.font="20px Arial"; ctx.fillText("S Shop | K Abilities | C Skins",200,220); }
    if(state==="gameover"){ ctx.fillStyle="white"; ctx.fillText("Game Over",350,200); ctx.fillText("Press R to Restart",320,240); }
    if(state==="shop"){ ctx.fillStyle="white"; ctx.fillText("Shop",400,120); }
    if(state==="abilities"){ ctx.fillText("Abilities",380,120); }
    if(state==="skins"){ ctx.fillText("Skins",400,120); }
}

// ===== MENU & SHOP =====
function setupMenu(){ clearButtons(); createMenuButton("START",400,260,()=>{ state="game"; resetGame(); clearButtons(); }); }

function setupShop(){
    clearButtons();
    createMenuButton("Buy Magnet 100",300,150,()=>{ if(totalCoins>=100){ ownedAbilities.magnet=true; totalCoins-=100; save(); } });
    createMenuButton("Buy Shield 50",300,180,()=>{ if(totalCoins>=50){ ownedAbilities.shield=true; totalCoins-=50; save(); } });
    createMenuButton("Buy Slow 60",300,210,()=>{ if(totalCoins>=60){ ownedAbilities.slow=true; totalCoins-=60; save(); } });
    createMenuButton("Buy Gun 150",300,240,()=>{ if(totalCoins>=150){ ownedAbilities.gun=true; totalCoins-=150; save(); setupShop(); } });

    let y=280;
    for(let sk in skins){
        if(!skins[sk]){
            createMenuButton(`Buy ${sk} ${skinPrices[sk]}`,300,y,()=>{ if(totalCoins>=skinPrices[sk]){ skins[sk]=true; totalCoins-=skinPrices[sk]; save(); setupShop(); } });
            y+=30;
        }
    }
}

function setupAbilities(){
    clearButtons();
    let y=150;
    for(let ab in ownedAbilities){
        createMenuButton(ab+(ownedAbilities[ab]?" (owned)":" (LOCKED)"),300,y,()=>{ if(ownedAbilities[ab]){ ability=ab; resetGame(); } });
        y+=30;
    }
}

function setupSkins(){
    clearButtons();
    let y=150;
    for(let sk in skins){
        createMenuButton(sk+(skins[sk]?" (selected)":" (LOCKED)"),300,y,()=>{ if(skins[sk]) selectedSkin=sk; });
        y+=30;
    }
}

// ===== LOOP =====
function loop(){ update(); draw(); requestAnimationFrame(loop); }
setupMenu();
loop();

</script>
</body>
</html>
