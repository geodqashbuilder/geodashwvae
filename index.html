<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival Polished</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
canvas{display:block;margin:auto;}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let state="menu";

// ===== DATA =====
let player,saws,coins,particles;
let goingUp=false;
let score=0,frame=0,difficulty=1;
let shake=0;

// ===== SAVE =====
let totalCoins=+localStorage.getItem("coins")||0;

let ownedAbilities = JSON.parse(localStorage.getItem("ownedAbilities")) || {
speed:true, magnet:false, shield:false, slow:false
};

let ability="speed";

let achievements = JSON.parse(localStorage.getItem("ach")) || {
score100:false, coins100:false
};

function save(){
localStorage.setItem("coins",totalCoins);
localStorage.setItem("ownedAbilities",JSON.stringify(ownedAbilities));
localStorage.setItem("ach",JSON.stringify(achievements));
}

// ===== AUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let musicOn=true;

function play(freq,dur){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.connect(g); g.connect(audioCtx.destination);
o.frequency.value=freq;
g.gain.setValueAtTime(0.1,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
o.start(); o.stop(audioCtx.currentTime+dur);
}

// simple music loop
setInterval(()=>{
if(musicOn && state==="game"){
play(200+Math.random()*100,0.2);
}
},400);

// ===== RESET =====
function resetGame(){

player={
x:120,
y:canvas.height/2,
size:10,
speed:4,
shield:0
};

// abilities applied
if(ability==="speed") player.speed=6;
if(ability==="shield") player.shield=1;

saws=[]; coins=[]; particles=[];
score=0; frame=0; difficulty=1;
}

// ===== INPUT =====
document.addEventListener("keydown",e=>{

if(e.key==="m") musicOn=!musicOn;

if(state==="menu"){
if(e.key==="Enter"){state="game"; resetGame();}
if(e.key==="s") state="shop";
if(e.key==="a") state="achievements";
}

else if(state==="game"){
if(e.key==="w"||e.key==="ArrowUp") goingUp=true;
}

else if(state==="gameover"){
if(e.key==="r"){state="game"; resetGame();}
if(e.key==="s") state="shop";
}

else if(state==="shop"){
if(e.key==="Escape") state="menu";
if(e.key==="1") buy("magnet",50);
if(e.key==="2") buy("shield",70);
if(e.key==="3") buy("slow",60);
if(e.key==="4") ability="speed";
if(e.key==="5" && ownedAbilities.magnet) ability="magnet";
if(e.key==="6" && ownedAbilities.shield) ability="shield";
if(e.key==="7" && ownedAbilities.slow) ability="slow";
}

else if(state==="achievements"){
if(e.key==="Escape") state="menu";
}

if(e.key==="Escape") state="menu";

});

document.addEventListener("keyup",e=>{
if(e.key==="w"||e.key==="ArrowUp") goingUp=false;
});

// ===== SHOP =====
function buy(name,cost){
if(!ownedAbilities[name] && totalCoins>=cost){
totalCoins-=cost;
ownedAbilities[name]=true;
save();
}
}

// ===== SPAWN =====
function spawnSaw(){
saws.push({
x:canvas.width+40,
y:Math.random()*canvas.height,
r:18 + difficulty*2,
speed:3 + difficulty*0.4
});
}

function spawnCoin(){
coins.push({
x:canvas.width+40,
y:Math.random()*(canvas.height-40)+20,
r:6
});
}

// ===== PARTICLES =====
function burst(x,y){
for(let i=0;i<10;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:20
});
}
}

// ===== UPDATE =====
function update(){

if(state!=="game") return;

frame++;
score+=0.5;
difficulty = 1 + score/80;

// movement
if(goingUp) player.y -= player.speed;
else player.y += player.speed;

player.y = Math.max(player.size, Math.min(canvas.height-player.size, player.y));

// spawn (slow affects rate)
let rate = Math.max(25, 90 - difficulty*5);
if(ability==="slow") rate *= 1.3;

if(frame % Math.floor(rate) === 0) spawnSaw();
if(frame % 110 === 0) spawnCoin();

// saws
for(let i=saws.length-1;i>=0;i--){
let s=saws[i];

let slowFactor = (ability==="slow") ? 0.6 : 1;
s.x -= s.speed * slowFactor;

let dx=player.x-s.x, dy=player.y-s.y;

if(Math.hypot(dx,dy) < s.r + player.size){

if(player.shield>0){
player.shield--;
burst(player.x,player.y);
shake=10;
saws.splice(i,1);
continue;
}

play(100,0.2);
shake=15;
state="gameover";
}

if(s.x<-100) saws.splice(i,1);
}

// coins
for(let i=coins.length-1;i>=0;i--){
let c=coins[i];

let dx=player.x-c.x, dy=player.y-c.y;
let dist=Math.hypot(dx,dy);

// improved magnet
if(ability==="magnet" && dist<150){
c.x += dx*0.08;
c.y += dy*0.08;
}else{
c.x -= 4;
}

if(dist < c.r + player.size){
totalCoins++;
burst(c.x,c.y);
coins.splice(i,1);
play(700,0.05);
}

if(c.x<-50) coins.splice(i,1);
}

// particles
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.x += p.vx;
p.y += p.vy;
p.life--;
if(p.life<=0) particles.splice(i,1);
}

// achievements
if(score>100) achievements.score100=true;
if(totalCoins>100) achievements.coins100=true;

save();
}

// ===== DRAW =====
function draw(){

// animated background
let g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
g.addColorStop(0,"hsl("+frame%360+",50%,10%)");
g.addColorStop(1,"#000");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

// screen shake
if(shake>0){
shake--;
ctx.save();
ctx.translate(Math.random()*6-3, Math.random()*6-3);
}

// player
if(state==="game"||state==="gameover"){
ctx.fillStyle="cyan";
ctx.fillRect(player.x-player.size, player.y-player.size, 20,20);

if(player.shield>0){
ctx.strokeStyle="blue";
ctx.beginPath();
ctx.arc(player.x,player.y,20,0,Math.PI*2);
ctx.stroke();
}

// saws
ctx.fillStyle="red";
for(let s of saws){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

// coins
ctx.fillStyle="gold";
for(let c of coins){
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();
}

// particles
ctx.fillStyle="yellow";
for(let p of particles){
ctx.fillRect(p.x,p.y,2,2);
}

// UI
ctx.fillStyle="white";
ctx.fillText("Score: "+Math.floor(score),10,20);
ctx.fillText("Coins: "+totalCoins,10,40);
ctx.fillText("Ability: "+ability,10,60);
}

// menu
if(state==="menu"){
ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("Wave Survival",300,150);
ctx.font="20px Arial";
ctx.fillText("ENTER Start | S Shop | A Achievements",230,220);
}

// shop
if(state==="shop"){
ctx.fillStyle="white";
ctx.fillText("1 Magnet (50)",300,150);
ctx.fillText("2 Shield (70)",300,180);
ctx.fillText("3 Slow (60)",300,210);
ctx.fillText("Select 4-7",300,260);
}

// achievements
if(state==="achievements"){
ctx.fillStyle="white";
ctx.fillText("Score100: "+(achievements.score100?"✔":"❌"),300,180);
ctx.fillText("Coins100: "+(achievements.coins100?"✔":"❌"),300,220);
}

// game over
if(state==="gameover"){
ctx.fillStyle="white";
ctx.fillText("Game Over",350,200);
}

if(shake>0) ctx.restore();
}

// LOOP
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
