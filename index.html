<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival Shop Edition</title>
<style>
body{
  margin:0;
  background:#111;
  overflow:hidden;
}

canvas{
  display:block;
  margin:auto;
  background:#222;
}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, saws, coins;
let goingUp;
let score, difficulty, frame;
let gameOver;
let totalCoins = localStorage.getItem("coins") || 0;
let speedLevel = localStorage.getItem("speedLevel") || 1;

function resetGame(){
player = {
  x:120,
  y:canvas.height/2,
  size:10,
  speed:4 + speedLevel * 0.5
};

saws = [];
coins = [];
goingUp = false;
score = 0;
difficulty = 1;
frame = 0;
gameOver = false;
}

resetGame();

document.addEventListener("keydown", e=>{
if(e.key==="w" || e.key==="ArrowUp") goingUp=true;

if(e.key==="r" && gameOver){
resetGame();
}

if(e.key==="b" && gameOver){
buyUpgrade();
}
});

document.addEventListener("keyup", e=>{
if(e.key==="w" || e.key==="ArrowUp") goingUp=false;
});

function spawnSaw(){
let y = Math.random() * canvas.height;
let radius = 18 + difficulty * 3;

saws.push({
x:canvas.width + 40,
y:y,
r:radius,
speed:3 + difficulty * 0.4
});
}

function spawnCoin(){
coins.push({
x:canvas.width + 40,
y:Math.random() * (canvas.height - 40) + 20,
r:6
});
}

function update(){

if(gameOver) return;

frame++;
score += 0.5;
difficulty = 1 + score / 60;

// classic movement
if(goingUp){
  player.y -= player.speed;
}else{
  player.y += player.speed;
}

// bounds
if(player.y < player.size) player.y = player.size;
if(player.y > canvas.height - player.size) player.y = canvas.height - player.size;

// spawning
let spawnRate = Math.max(25, 90 - difficulty * 5);

if(frame % Math.floor(spawnRate) === 0){
spawnSaw();
}

if(frame % 120 === 0){
spawnCoin();
}

// saws
for(let i = saws.length-1; i >= 0; i--){
let saw = saws[i];
saw.x -= saw.speed;

let dx = player.x - saw.x;
let dy = player.y - saw.y;
let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < saw.r + player.size){
gameOver = true;
}

if(saw.x < -100){
saws.splice(i,1);
}
}

// coins
for(let i = coins.length-1; i >= 0; i--){
let c = coins[i];
c.x -= 4;

let dx = player.x - c.x;
let dy = player.y - c.y;
let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < c.r + player.size){
totalCoins++;
localStorage.setItem("coins", totalCoins);
coins.splice(i,1);
}

if(c.x < -50){
coins.splice(i,1);
}
}

}

function buyUpgrade(){
let cost = speedLevel * 10;

if(totalCoins >= cost){
  totalCoins -= cost;
  speedLevel++;
  localStorage.setItem("coins", totalCoins);
  localStorage.setItem("speedLevel", speedLevel);
}
}

function drawSaw(x,y,r){
ctx.save();
ctx.translate(x,y);
ctx.rotate(frame*0.05);

ctx.beginPath();
for(let i=0;i<20;i++){
let angle = i * Math.PI / 10;
let rad = i%2===0 ? r : r/2;
ctx.lineTo(Math.cos(angle)*rad, Math.sin(angle)*rad);
}
ctx.closePath();
ctx.fillStyle="red";
ctx.fill();
ctx.restore();
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// player
ctx.fillStyle="cyan";
ctx.fillRect(player.x-player.size, player.y-player.size, player.size*2, player.size*2);

// saws
for(let saw of saws){
drawSaw(saw.x, saw.y, saw.r);
}

// coins
ctx.fillStyle="gold";
for(let c of coins){
ctx.beginPath();
ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
ctx.fill();
}

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: " + Math.floor(score), 15, 30);
ctx.fillText("Coins: " + totalCoins, 15, 55);
ctx.fillText("Speed Lv: " + speedLevel, 15, 80);

// game over + shop
if(gameOver){

ctx.fillStyle="white";
ctx.font="50px Arial";
ctx.fillText("Game Over", canvas.width/2 - 140, canvas.height/2);

ctx.font="20px Arial";
ctx.fillText("Press R to Restart", canvas.width/2 - 90, canvas.height/2 + 40);

let cost = speedLevel * 10;

ctx.fillText("Press B to Upgrade Speed ("+cost+" coins)", canvas.width/2 - 150, canvas.height/2 + 70);

}

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
