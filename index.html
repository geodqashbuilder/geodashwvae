<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival Deluxe</title>
<style>
body{ margin:0; background:#111; overflow:hidden;}
canvas{ display:block; margin:auto; background:#222;}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let state = "menu"; // menu, game, shop, gameover

let player, saws, coins, particles;
let goingUp=false;

let score=0, difficulty=1, frame=0;

let totalCoins = Number(localStorage.getItem("coins")) || 0;

let upgrades = {
speed: Number(localStorage.getItem("speed")) || 1,
magnet: Number(localStorage.getItem("magnet")) || 0,
shield: Number(localStorage.getItem("shield")) || 0,
slow: Number(localStorage.getItem("slow")) || 0
};

function save(){
localStorage.setItem("coins", totalCoins);
for(let k in upgrades){
localStorage.setItem(k, upgrades[k]);
}
}

function resetGame(){
player = {
x:120,
y:canvas.height/2,
size:10,
speed:4 + upgrades.speed*0.6,
shield: upgrades.shield
};

saws=[]; coins=[]; particles=[];
score=0; difficulty=1; frame=0;
}

resetGame();

// INPUT
document.addEventListener("keydown", e=>{

if(state==="menu" && e.key==="Enter"){
state="game";
resetGame();
}

if(state==="game"){
if(e.key==="w" || e.key==="ArrowUp") goingUp=true;
}

if(state==="gameover"){
if(e.key==="r"){
state="game";
resetGame();
}
if(e.key==="s"){
state="shop";
}
}

if(state==="shop"){
if(e.key==="Escape") state="menu";

if(e.key==="1") buy("speed");
if(e.key==="2") buy("magnet");
if(e.key==="3") buy("shield");
if(e.key==="4") buy("slow");
}

});

document.addEventListener("keyup", e=>{
if(e.key==="w" || e.key==="ArrowUp") goingUp=false;
});

// BUY SYSTEM
function cost(type){
return (upgrades[type]+1)*15;
}

function buy(type){
let c = cost(type);
if(totalCoins >= c){
totalCoins -= c;
upgrades[type]++;
save();
}
}

// SPAWN
function spawnSaw(){
saws.push({
x:canvas.width+40,
y:Math.random()*canvas.height,
r:18 + difficulty*3,
speed:3 + difficulty*0.4
});
}

function spawnCoin(){
coins.push({
x:canvas.width+40,
y:Math.random()*(canvas.height-40)+20,
r:6
});
}

// PARTICLES
function spawnParticles(x,y){
for(let i=0;i<10;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:30
});
}
}

// UPDATE
function update(){

if(state!=="game") return;

frame++;
score+=0.5;
difficulty = 1 + score/60;

// movement
if(goingUp) player.y -= player.speed;
else player.y += player.speed;

// bounds
if(player.y < player.size) player.y = player.size;
if(player.y > canvas.height-player.size) player.y = canvas.height-player.size;

// spawn
if(frame % Math.max(25, 90-difficulty*5) === 0) spawnSaw();
if(frame % 100 === 0) spawnCoin();

// saws
for(let i=saws.length-1;i>=0;i--){
let s=saws[i];
let slowFactor = upgrades.slow>0 ? 1 - upgrades.slow*0.1 : 1;

s.x -= s.speed * slowFactor;

let dx=player.x-s.x;
let dy=player.y-s.y;
let d=Math.sqrt(dx*dx+dy*dy);

if(d < s.r + player.size){
if(player.shield>0){
player.shield--;
saws.splice(i,1);
continue;
}else{
state="gameover";
}
}

if(s.x<-100) saws.splice(i,1);
}

// coins
for(let i=coins.length-1;i>=0;i--){
let c=coins[i];

// magnet
let dx=player.x-c.x;
let dy=player.y-c.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(upgrades.magnet>0 && dist < 120){
c.x += dx*0.05;
c.y += dy*0.05;
}else{
c.x -= 4;
}

if(dist < c.r + player.size){
totalCoins++;
spawnParticles(c.x,c.y);
coins.splice(i,1);
save();
}

if(c.x<-50) coins.splice(i,1);
}

// particles
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.x+=p.vx;
p.y+=p.vy;
p.life--;

if(p.life<=0) particles.splice(i,1);
}

}

// DRAW
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="menu"){
ctx.fillStyle="white";
ctx.font="50px Arial";
ctx.fillText("Wave Survival", 250,180);
ctx.font="20px Arial";
ctx.fillText("Press ENTER to Start", 320,230);
ctx.fillText("Coins: "+totalCoins, 380,270);
}

if(state==="game" || state==="gameover"){

// player
ctx.fillStyle="cyan";
ctx.fillRect(player.x-player.size, player.y-player.size, player.size*2, player.size*2);

// shield visual
if(player.shield>0){
ctx.strokeStyle="blue";
ctx.beginPath();
ctx.arc(player.x,player.y,20,0,Math.PI*2);
ctx.stroke();
}

// saws
ctx.fillStyle="red";
for(let s of saws){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

// coins
ctx.fillStyle="gold";
for(let c of coins){
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();
}

// particles
ctx.fillStyle="yellow";
for(let p of particles){
ctx.fillRect(p.x,p.y,3,3);
}

// UI
ctx.fillStyle="white";
ctx.fillText("Score: "+Math.floor(score),15,30);
ctx.fillText("Coins: "+totalCoins,15,55);

// game over
if(state==="gameover"){
ctx.font="40px Arial";
ctx.fillText("Game Over",330,200);
ctx.font="20px Arial";
ctx.fillText("R = Restart | S = Shop",320,240);
}
}

if(state==="shop"){
ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("SHOP",400,80);

ctx.font="20px Arial";

ctx.fillText("1. Speed Lv."+upgrades.speed+" ($"+cost("speed")+")",250,150);
ctx.fillText("2. Magnet Lv."+upgrades.magnet+" ($"+cost("magnet")+")",250,190);
ctx.fillText("3. Shield Lv."+upgrades.shield+" ($"+cost("shield")+")",250,230);
ctx.fillText("4. Slow Time Lv."+upgrades.slow+" ($"+cost("slow")+")",250,270);

ctx.fillText("Coins: "+totalCoins,250,320);
ctx.fillText("ESC = Back",250,350);
}

}

// LOOP
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
