<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival Final</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
canvas{display:block;margin:auto;background:#111;}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let state="menu";

// ===== DATA =====
let player,saws,coins,particles;
let goingUp=false;
let score=0,frame=0,difficulty=1;

// ===== SAVE =====
let totalCoins=+localStorage.getItem("coins")||0;

let ownedAbilities = JSON.parse(localStorage.getItem("ownedAbilities")) || {
speed:true,
magnet:false,
shield:false,
slow:false
};

let ability="speed";

let achievements = JSON.parse(localStorage.getItem("ach")) || {
score100:false,
coins100:false
};

function save(){
localStorage.setItem("coins",totalCoins);
localStorage.setItem("ownedAbilities",JSON.stringify(ownedAbilities));
localStorage.setItem("ach",JSON.stringify(achievements));
}

// ===== SOUND =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function sound(freq,dur){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.connect(g); g.connect(audioCtx.destination);
o.frequency.value=freq;
g.gain.setValueAtTime(0.1,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
o.start(); o.stop(audioCtx.currentTime+dur);
}

// ===== RESET =====
function resetGame(){

player={
x:120,
y:canvas.height/2,
size:10,
speed:4,
shield:0
};

// apply ability
if(ability==="speed") player.speed=6;
if(ability==="shield") player.shield=1;

saws=[]; coins=[]; particles=[];
score=0; frame=0; difficulty=1;
}

// ===== INPUT =====
document.addEventListener("keydown",e=>{

if(state==="menu"){
if(e.key==="Enter"){state="game"; resetGame(); sound(300,0.2);}
if(e.key==="s") state="shop";
if(e.key==="a") state="achievements";
}

else if(state==="game"){
if(e.key==="w"||e.key==="ArrowUp") goingUp=true;
}

else if(state==="gameover"){
if(e.key==="r"){state="game"; resetGame();}
if(e.key==="s") state="shop";
}

else if(state==="shop"){
if(e.key==="Escape") state="menu";

if(e.key==="1") buyAbility("magnet",50);
if(e.key==="2") buyAbility("shield",70);
if(e.key==="3") buyAbility("slow",60);
if(e.key==="4") ability="speed";
if(e.key==="5" && ownedAbilities.magnet) ability="magnet";
if(e.key==="6" && ownedAbilities.shield) ability="shield";
if(e.key==="7" && ownedAbilities.slow) ability="slow";
}

else if(state==="achievements"){
if(e.key==="Escape") state="menu";
}

if(e.key==="Escape") state="menu";

});

document.addEventListener("keyup",e=>{
if(e.key==="w"||e.key==="ArrowUp") goingUp=false;
});

// ===== SHOP =====
function buyAbility(name,cost){
if(!ownedAbilities[name] && totalCoins>=cost){
totalCoins-=cost;
ownedAbilities[name]=true;
save();
}
}

// ===== SPAWN =====
function spawnSaw(){
saws.push({
x:canvas.width+40,
y:Math.random()*canvas.height,
r:18 + difficulty*2,
speed:3 + difficulty*0.4
});
}

function spawnCoin(){
coins.push({
x:canvas.width+40,
y:Math.random()*(canvas.height-40)+20,
r:6
});
}

// ===== UPDATE =====
function update(){

if(state!=="game") return;

frame++;
score+=0.5;
difficulty = 1 + score/60;

// movement
if(goingUp) player.y -= player.speed;
else player.y += player.speed;

// bounds FIX
player.y = Math.max(player.size, Math.min(canvas.height-player.size, player.y));

// spawn
if(frame % Math.floor(Math.max(25, 90 - difficulty*5)) === 0){
spawnSaw();
}

if(frame % 110 === 0){
spawnCoin();
}

// saws
for(let i=saws.length-1;i>=0;i--){
let s=saws[i];

let slowFactor = (ability==="slow") ? 0.6 : 1;
s.x -= s.speed * slowFactor;

let dx=player.x-s.x, dy=player.y-s.y;

if(Math.hypot(dx,dy) < s.r + player.size){

if(player.shield>0){
player.shield--;
saws.splice(i,1);
continue;
}

sound(100,0.2);
state="gameover";
}

// cleanup
if(s.x<-100) saws.splice(i,1);
}

// coins
for(let i=coins.length-1;i>=0;i--){
let c=coins[i];

let dx=player.x-c.x, dy=player.y-c.y;
let dist=Math.hypot(dx,dy);

// magnet
if(ability==="magnet" && dist<120){
c.x += dx*0.05;
c.y += dy*0.05;
}else{
c.x -= 4;
}

if(dist < c.r + player.size){
totalCoins++;
particles.push({x:c.x,y:c.y,life:20});
coins.splice(i,1);
sound(700,0.05);
}

// cleanup
if(c.x<-50) coins.splice(i,1);
}

// particles
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.y -= 1;
p.life--;
if(p.life<=0) particles.splice(i,1);
}

// achievements
if(score>100) achievements.score100=true;
if(totalCoins>100) achievements.coins100=true;

save();
}

// ===== DRAW =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// MENU
if(state==="menu"){
ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("Wave Survival",300,150);

ctx.font="20px Arial";
ctx.fillText("ENTER Start",360,200);
ctx.fillText("S Shop | A Achievements",300,240);
ctx.fillText("Selected: "+ability,350,280);
}

// GAME
if(state==="game"||state==="gameover"){

// player
ctx.fillStyle="cyan";
ctx.fillRect(player.x-player.size, player.y-player.size, 20, 20);

// shield
if(player.shield>0){
ctx.strokeStyle="blue";
ctx.beginPath();
ctx.arc(player.x,player.y,20,0,Math.PI*2);
ctx.stroke();
}

// saws
ctx.fillStyle="red";
for(let s of saws){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

// coins
ctx.fillStyle="gold";
for(let c of coins){
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();
}

// particles
ctx.fillStyle="yellow";
for(let p of particles){
ctx.fillRect(p.x,p.y,2,2);
}

// UI
ctx.fillStyle="white";
ctx.fillText("Score: "+Math.floor(score),10,20);
ctx.fillText("Coins: "+totalCoins,10,40);

// game over
if(state==="gameover"){
ctx.font="30px Arial";
ctx.fillText("Game Over",350,200);
ctx.font="18px Arial";
ctx.fillText("R Retry | S Shop",350,230);
}
}

// SHOP
if(state==="shop"){
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("Shop",400,80);

ctx.font="18px Arial";

ctx.fillText("Buy:",300,140);
ctx.fillText("1 Magnet (50)",300,170);
ctx.fillText("2 Shield (70)",300,200);
ctx.fillText("3 Slow (60)",300,230);

ctx.fillText("Select:",300,280);
ctx.fillText("4 Speed (default)",300,310);
ctx.fillText("5 Magnet",300,340);
ctx.fillText("6 Shield",300,370);
ctx.fillText("7 Slow",300,400);

ctx.fillText("Coins: "+totalCoins,300,430);
}

// ACHIEVEMENTS
if(state==="achievements"){
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("Achievements",320,100);

ctx.font="20px Arial";
ctx.fillText("Score 100: "+(achievements.score100?"✔":"❌"),300,180);
ctx.fillText("100 Coins: "+(achievements.coins100?"✔":"❌"),300,220);
ctx.fillText("ESC to Menu",300,300);
}

}

// LOOP
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
