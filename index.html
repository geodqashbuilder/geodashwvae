<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wave Survival+</title>
<style>
body{
  margin:0;
  background:#111;
  overflow:hidden;
}

canvas{
  display:block;
  margin:auto;
  background:#222;
}
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player;
let saws;
let goingUp;
let score;
let difficulty;
let frame;
let gameOver;
let shakeTime;
let highScore = localStorage.getItem("waveHighScore") || 0;

function resetGame(){
player = {
  x:120,
  y:canvas.height/2,
  size:10,
  vel:0
};

saws = [];
goingUp = false;
score = 0;
difficulty = 1;
frame = 0;
gameOver = false;
shakeTime = 0;
}

resetGame();

document.addEventListener("keydown", e=>{
if(e.key==="w" || e.key==="ArrowUp") goingUp=true;

if(e.key==="r" && gameOver){
resetGame();
}
});

document.addEventListener("keyup", e=>{
if(e.key==="w" || e.key==="ArrowUp") goingUp=false;
});

function spawnSaw(){

let minGap = 80;
let y;

if(saws.length > 0){
  let lastY = saws[saws.length-1].y;
  y = lastY + (Math.random() * 200 - 100);

  if(Math.abs(y - lastY) < minGap){
    y += (y > lastY ? minGap : -minGap);
  }
}else{
  y = Math.random() * canvas.height;
}

y = Math.max(40, Math.min(canvas.height - 40, y));

let radius = 18 + difficulty * 2;

saws.push({
  x:canvas.width + 40,
  y:y,
  r:radius,
  speed:3 + difficulty * 0.3
});
}

function update(){

if(gameOver) return;

frame++;
score += 0.5;

// capped difficulty
difficulty = 1 + Math.min(score / 100, 10);

// physics movement
if(goingUp){
  player.vel -= 0.3;
}else{
  player.vel += 0.2;
}

player.vel *= 0.98;
player.y += player.vel;

// boundaries
if(player.y < player.size) player.y = player.size;
if(player.y > canvas.height - player.size) player.y = canvas.height - player.size;

// spawn logic
let spawnRate = Math.max(25, 90 - difficulty * 5);

if(frame % Math.floor(spawnRate) === 0){
spawnSaw();
}

// saw updates
for(let i = saws.length-1; i >= 0; i--){

let saw = saws[i];
saw.x -= saw.speed;

// collision
let dx = player.x - saw.x;
let dy = player.y - saw.y;
let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < saw.r + player.size){
gameOver = true;
shakeTime = 20;

if(score > highScore){
  highScore = Math.floor(score);
  localStorage.setItem("waveHighScore", highScore);
}
}

// remove off-screen
if(saw.x < -100){
saws.splice(i,1);
}

}

}

function drawSaw(x,y,r){

ctx.save();
ctx.translate(x,y);
ctx.rotate(frame*0.05);

ctx.beginPath();

for(let i=0;i<20;i++){
let angle = i * Math.PI / 10;
let rad = i%2===0 ? r : r/2;
ctx.lineTo(Math.cos(angle)*rad, Math.sin(angle)*rad);
}

ctx.closePath();
ctx.fillStyle="red";
ctx.fill();

ctx.restore();
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// screen shake
if(shakeTime > 0){
  shakeTime--;
  ctx.save();
  ctx.translate(Math.random()*6-3, Math.random()*6-3);
}

// player with rotation
ctx.save();
ctx.translate(player.x, player.y);
ctx.rotate(player.vel * 0.05);

ctx.fillStyle="cyan";
ctx.fillRect(-player.size, -player.size, player.size*2, player.size*2);

ctx.restore();

// saws
for(let saw of saws){
drawSaw(saw.x, saw.y, saw.r);
}

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: " + Math.floor(score), 15, 30);
ctx.fillText("Difficulty: " + difficulty.toFixed(1), 15, 55);
ctx.fillText("High Score: " + highScore, 15, 80);

// game over
if(gameOver){

ctx.fillStyle="white";
ctx.font="50px Arial";
ctx.fillText("Game Over", canvas.width/2 - 140, canvas.height/2);

ctx.font="20px Arial";
ctx.fillText("Press R to Restart", canvas.width/2 - 90, canvas.height/2 + 40);

}

if(shakeTime > 0){
  ctx.restore();
}

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
